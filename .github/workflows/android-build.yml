          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > frontend/android/app/my-release-key.jks
          echo "MYAPP_UPLOAD_STORE_FILE=app/my-release-key.jks" >> frontend/android/gradle.properties
          echo "MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> frontend/android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> frontend/android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> frontend/android/gradle.properties

      - name: Prebuild native Android project (Expo)
        working-directory: frontend
        run: |
          npx --yes expo prebuild --platform android --yes

      - name: Build Release APK (Gradle)
        run: |
